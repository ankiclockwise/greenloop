# OAuth2 and JWT Configuration
spring:
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - openid
              - email
              - profile
            client-name: Google
        provider:
          google:
            issuer-uri: https://accounts.google.com
            user-info-uri: https://www.googleapis.com/oauth2/v2/userinfo
            user-name-attribute: email

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:your-super-secret-key-that-must-be-at-least-256-bits-long-for-HS256-algorithm-encryption}
  expiration:
    access: 3600000  # 1 hour in milliseconds
    refresh: 604800000  # 7 days in milliseconds

# Application URLs
app:
  frontend:
    url: ${FRONTEND_URL:http://localhost:5173}
    production:
      url: ${FRONTEND_PRODUCTION_URL:https://greenloop.com}
  backend:
    url: ${BACKEND_URL:http://localhost:8080}

# Logging
logging:
  level:
    com.greenloop.auth: DEBUG
    org.springframework.security: INFO
    org.springframework.security.oauth2: DEBUG
